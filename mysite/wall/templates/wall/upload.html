<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Upload Thought - Freedom Wall</title>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 via-indigo-950 to-black text-white">
  <div class="container mx-auto p-6">
    <div class="mb-4 flex items-center justify-between">
      <a href="/wall/" class="rounded bg-slate-800 px-3 py-2 text-sm hover:bg-slate-700">View Wall</a>
      <a href="/logout/" class="rounded bg-rose-600 px-3 py-2 text-sm hover:bg-rose-500">Logout</a>
    </div>

    <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
      <div class="rounded-xl border border-indigo-600/40 bg-slate-900/70 p-6 backdrop-blur-sm">
        <h2 class="text-xl font-bold">Create a new post</h2>
        <form method="post" class="mt-4 space-y-4">{% csrf_token %}
          {{ form.non_field_errors }}
          <div>{{ form.title }}</div>
          <div>{{ form.content }}</div>
          <button type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 font-bold hover:bg-indigo-500">Post your thought</button>
        </form>
      </div>

      <div class="rounded-xl border border-indigo-600/40 bg-slate-800/50 p-6 backdrop-blur-sm">
        <h2 class="text-xl font-bold">Live preview</h2>
        <div class="mt-4 space-y-4">
          <div class="rounded-lg bg-slate-900 p-4 text-white" id="previewCard">
            <h3 class="text-lg font-semibold" id="previewTitle">Title preview</h3>
            <p class="mt-2 text-slate-300" id="previewContent">Start typing to see your thought here.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const titleInput = document.querySelector('.input-title');
    const contentInput = document.querySelector('.input-content');
    const previewTitle = document.getElementById('previewTitle');
    const previewContent = document.getElementById('previewContent');

    function updatePreview() {
      previewTitle.textContent = titleInput.value.trim() || 'Title preview';
      previewContent.textContent = contentInput.value.trim() || 'Start typing to see your thought here.';
    }

    titleInput.addEventListener('input', updatePreview);
    contentInput.addEventListener('input', updatePreview);
  </script>
</body>
</html>
